version: '3'
dotenv: ['.env']
tasks:
  run:
    cmds:
    - go run cmd/main.go
  test:
    cmds:
    - go vet ./...
    - go test ./...
  testv:
    cmds:
    - go vet ./...
    - go test ./... -v
  build:
    vars:
      VERSION: 0.0.1
    cmds:
      - docker build
        -f configs/docker/dockerfile
        -t aaroncunliffe/link-shortener:{{.VERSION}}
        --build-arg VERSION={{.VERSION}}
        --build-arg BUILD_DATE={{ now | date "2006-01-02"}}
        .
  docker-compose-up:
    cmds:
    - docker compose -f configs/docker/compose.yaml up
  docker-compose-down:
    cmds:
    - docker compose -f configs/docker/compose.yaml down --rmi local --volumes
  db-inspect:
    cmds:
    - atlas schema inspect 
      -u "postgresql://postgres:password@localhost:5432/postgres?sslmode=disable" 
      --format "{{ printf "{{ sql . }}" }}" > configs/database/schema.sql
  db-migrate:
    cmds:
    - atlas schema apply 
      -u "postgresql://postgres:password@localhost:5432/postgres?sslmode=disable" 
      --to file://configs/database/schema.sql 
      --dev-url "docker://postgres/15"
  sqlc:
    cmds:
    - sqlc generate -f configs/database/sqlc.yaml 
