services:
  api:
    init: true
    build:
      context: ../../.
      dockerfile: configs/docker/dockerfile.dev
    ports:
      - 8080:8080 # web
      - 4040:4040 # debug
    volumes:
      - ../../.:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4040/debug/readiness"]
    stop_grace_period: 30s
    depends_on:
      - db
  db:
    image: postgres:15-alpine  
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data  # Persist data using a named volume
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro # Auto apply our schema
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=grafana
      - GF_SECURITY_ADMIN_PASSWORD=password
    volumes:
      - ./grafana:/etc/grafana/provisioning
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
  k6:
    image: grafana/k6:latest
    profiles: ["demo"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      - TARGET_URL=api:8080
    volumes:
      - ./k6:/scripts:ro
    command: run /scripts/demo.js
volumes:
  pgdata:
  prometheus_data:
