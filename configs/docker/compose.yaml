services:
  api:
    build:
      context: ../../.
      dockerfile: configs/docker/dockerfile.dev
    ports:
      - 8080:8080 # web
      - 4040:4040 # debug
    volumes:
      - ../../.:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4040/debug/readiness"]
    depends_on:
      - db
  db:
    image: postgres:15-alpine  
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data  # Persist data using a named volume
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro # Auto apply our schema
volumes:
  pgdata: