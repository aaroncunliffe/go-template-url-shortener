apiVersion: 1

datasources:
- name: Prometheus
  uid: prometheus
  type: prometheus
  url: http://prometheus:9090
  access: proxy
  jsonData:
    timeInterval: 15s
  editable: false
- name: Postgres
  uid: postgres
  type: postgres
  isDefault: true
  url: db:5432
  user: postgres
  secureJsonData:
    password: 'password'
  jsonData:
      database: postgres
  postgresVersion: 1500 # 15
  sslmode: 'disable'
  editable: false
- name: Loki
  uid: loki
  type: loki
  url: http://loki:3100
  access: proxy
  editable: false
- name: Tempo
  uid: tempo
  type: tempo
  url: http://tempo:3200
  access: proxy
  editable: false