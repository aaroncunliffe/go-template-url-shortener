name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
          cache: true

      - name: Vulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test
        run: go test -race -shuffle=on ./...