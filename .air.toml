root = "."
tmp_dir = "tmp"
env_files = [".env"]

[build]
cmd = "go build -ldflags '-X main.version=air' -o ./tmp/main ./cmd/main.go"
entrypoint = ["./tmp/main"]
include_ext = ["go", "tpl", "tmpl", "html", "sql", "yaml", "yml", "toml", "env"]
exclude_dir = ["tmp", "vendor", ".git"]
exclude_regex = ["_test\\.go"]
stop_on_error = true
poll = true
poll_interval = 500

[log]
time = true

[misc]
clean_on_exit = true
